<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Score Library</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;600&family=DM+Mono:wght@400;500&family=Noto+Sans+JP:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:          #f7f6f3;
    --bg2:         #ffffff;
    --bg3:         #f0efe9;
    --bg4:         #e8e6de;
    --border:      #e0ddd4;
    --border2:     #ccc9be;
    --accent:      #2d6a4f;
    --accent-dk:   #1b4332;
    --accent-lt:   #52b788;
    --accent-dim:  rgba(45,106,79,0.08);
    --text:        #1a1a17;
    --text2:       #5a5849;
    --text3:       #9a9585;
    --danger:      #b84040;
    --danger-dim:  rgba(184,64,64,0.10);
    --panel-w:     272px;
    --serif:       'Noto Serif JP', serif;
    --sans:        'Noto Sans JP', sans-serif;
    --mono:        'DM Mono', monospace;
    --shadow-sm:   0 1px 4px rgba(0,0,0,0.07);
    --shadow-md:   0 4px 20px rgba(0,0,0,0.10);
    --shadow-lg:   0 8px 40px rgba(0,0,0,0.14);
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    font-size: 14px;
    height: 100vh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  /* ─── Header ─── */
  header {
    height: 54px;
    background: var(--accent-dk);
    display: flex;
    align-items: center;
    padding: 0 24px;
    gap: 14px;
    flex-shrink: 0;
    z-index: 100;
  }
  .logo {
    font-family: var(--serif);
    font-size: 18px;
    font-weight: 600;
    color: #fff;
    letter-spacing: 0.06em;
  }
  .logo-mark { color: var(--accent-lt); margin-right: 7px; }
  .logo-sub {
    font-family: var(--mono);
    font-size: 10px;
    color: rgba(255,255,255,0.42);
    letter-spacing: 0.22em;
    text-transform: uppercase;
    margin-top: 1px;
  }
  .header-sep { flex: 1; }
  .header-count {
    font-family: var(--mono);
    font-size: 11px;
    color: rgba(255,255,255,0.4);
    letter-spacing: 0.1em;
  }

  /* ─── Layout ─── */
  .layout { display: flex; flex: 1; overflow: hidden; }

  /* ─── Score List ─── */
  .score-list-wrap {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    background: var(--bg2);
  }
  .list-header {
    padding: 14px 20px 12px;
    border-bottom: 1px solid var(--border);
    background: var(--bg2);
    display: flex;
    align-items: center;
    gap: 10px;
    flex-shrink: 0;
  }
  .list-title {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--text3);
    flex: 1;
  }
  .search-box {
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 6px 12px;
    color: var(--text);
    font-family: var(--sans);
    font-size: 13px;
    width: 210px;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  .search-box::placeholder { color: var(--text3); }
  .search-box:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-dim); }

  .score-table-wrap { flex: 1; overflow-y: auto; }
  .score-table-wrap::-webkit-scrollbar { width: 6px; }
  .score-table-wrap::-webkit-scrollbar-track { background: transparent; }
  .score-table-wrap::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }

  table { width: 100%; border-collapse: collapse; }
  thead { position: sticky; top: 0; background: var(--bg3); z-index: 10; }
  th {
    padding: 10px 16px;
    text-align: left;
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--text3);
    border-bottom: 1px solid var(--border);
    font-weight: 400;
    white-space: nowrap;
  }
  th:first-child { width: 84px; }
  th.col-actions { width: 56px; text-align: center; }

  tbody tr {
    border-bottom: 1px solid var(--border);
    cursor: pointer;
    transition: background 0.13s;
  }
  tbody tr:hover { background: var(--bg3); }
  tbody tr.active { background: var(--accent-dim); }
  tbody tr.in-queue { background: rgba(45,106,79,0.04); }
  tbody tr.in-queue.active { background: var(--accent-dim); }

  td { padding: 12px 16px; vertical-align: middle; }
  td.col-num { font-family: var(--mono); font-size: 12px; color: var(--text3); letter-spacing: 0.1em; }
  td.col-title { font-family: var(--serif); font-size: 15px; color: var(--text); }
  td.col-composer { color: var(--text2); font-size: 13px; }

  .genre-badge {
    display: inline-block;
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 2px 8px;
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.08em;
    color: var(--text2);
  }
  td.col-actions { text-align: center; }
  .btn-add {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 28px;
    height: 28px;
    border-radius: 6px;
    border: 1px solid var(--border2);
    cursor: pointer;
    font-size: 17px;
    line-height: 1;
    transition: all 0.15s;
    background: transparent;
    color: var(--text2);
  }
  .btn-add:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-dim); }
  .btn-add.added { border-color: var(--accent); color: #fff; background: var(--accent); font-size: 13px; }
  .in-queue-dot {
    display: inline-block;
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--accent);
    margin-right: 7px;
    vertical-align: middle;
    opacity: 0;
    transition: opacity 0.2s;
  }
  tr.in-queue .in-queue-dot { opacity: 1; }

  /* ─── Right Panel ─── */
  .right-panel {
    width: var(--panel-w);
    background: var(--bg2);
    display: flex;
    flex-direction: column;
    overflow: hidden;
    flex-shrink: 0;
    border-left: 1px solid var(--border);
  }
  .panel-section-title {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--text3);
    padding: 15px 18px 11px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
    background: var(--bg3);
  }
  .queue-list { flex: 1; overflow-y: auto; padding: 6px 0; }
  .queue-list::-webkit-scrollbar { width: 4px; }
  .queue-list::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }
  .queue-empty { padding: 32px 18px; text-align: center; color: var(--text3); font-size: 12px; line-height: 2; }
  .queue-empty-icon { font-size: 26px; display: block; margin-bottom: 10px; opacity: 0.28; }

  .queue-item {
    padding: 10px 14px 10px 16px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: flex-start;
    gap: 9px;
    cursor: pointer;
    transition: background 0.13s;
  }
  .queue-item:hover { background: var(--bg3); }
  .queue-item-num { font-family: var(--mono); font-size: 10px; color: var(--accent); letter-spacing: 0.1em; margin-top: 2px; flex-shrink: 0; }
  .queue-item-title { font-family: var(--serif); font-size: 13px; color: var(--text); line-height: 1.45; flex: 1; }
  .queue-item-remove {
    width: 18px; height: 18px;
    border-radius: 4px;
    border: 1px solid transparent;
    background: transparent;
    color: var(--text3);
    cursor: pointer;
    font-size: 13px;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    transition: all 0.13s;
    margin-top: 1px;
  }
  .queue-item-remove:hover { border-color: var(--danger); color: var(--danger); background: var(--danger-dim); }

  .panel-footer { padding: 14px 16px; border-top: 1px solid var(--border); flex-shrink: 0; }
  .btn-generate {
    width: 100%;
    padding: 11px;
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 8px;
    font-family: var(--serif);
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    letter-spacing: 0.04em;
    transition: background 0.18s, box-shadow 0.18s;
    box-shadow: var(--shadow-sm);
  }
  .btn-generate:hover { background: var(--accent-dk); box-shadow: var(--shadow-md); }
  .btn-generate:disabled { background: var(--border2); color: var(--text3); cursor: not-allowed; box-shadow: none; }

  /* ─── Detail Panel ─── */
  .detail-overlay {
    position: fixed; inset: 54px 0 0 0;
    z-index: 200; pointer-events: none; display: flex;
  }
  .detail-backdrop {
    position: absolute; inset: 0;
    background: rgba(26,26,23,0.32);
    opacity: 0; transition: opacity 0.28s;
    pointer-events: none; backdrop-filter: blur(2px);
  }
  .detail-panel {
    margin-left: auto;
    width: calc(100% - var(--panel-w));
    max-width: 860px;
    background: var(--bg2);
    border-left: 1px solid var(--border);
    display: flex; flex-direction: column;
    transform: translateX(100%);
    transition: transform 0.3s cubic-bezier(0.4,0,0.2,1);
    pointer-events: none; overflow: hidden;
    box-shadow: var(--shadow-lg);
  }
  .detail-overlay.open .detail-backdrop { opacity: 1; pointer-events: all; }
  .detail-overlay.open .detail-panel { transform: translateX(0); pointer-events: all; }

  .detail-header {
    padding: 20px 24px 16px;
    border-bottom: 1px solid var(--border);
    display: flex; align-items: flex-start; gap: 14px;
    flex-shrink: 0; background: var(--bg2);
  }
  .detail-num { font-family: var(--mono); font-size: 11px; color: var(--accent); letter-spacing: 0.14em; margin-top: 5px; flex-shrink: 0; }
  .detail-title-wrap { flex: 1; }
  .detail-title { font-family: var(--serif); font-size: 21px; font-weight: 600; color: var(--text); line-height: 1.3; }
  .detail-subtitle { font-size: 13px; color: var(--text2); margin-top: 4px; }
  .btn-close {
    background: transparent; border: 1px solid var(--border2); color: var(--text2);
    border-radius: 6px; width: 32px; height: 32px;
    cursor: pointer; font-size: 17px;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.14s; flex-shrink: 0; margin-top: 2px;
  }
  .btn-close:hover { border-color: var(--text2); background: var(--bg3); color: var(--text); }

  .detail-body { flex: 1; overflow: hidden; display: flex; flex-direction: column; }
  .detail-tabs {
    display: flex; padding: 0 24px;
    border-bottom: 1px solid var(--border);
    background: var(--bg2); flex-shrink: 0;
  }
  .detail-tab {
    padding: 12px 20px;
    font-family: var(--mono); font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase;
    color: var(--text3); cursor: pointer;
    border: none; border-bottom: 2px solid transparent; margin-bottom: -1px;
    background: none; transition: all 0.14s;
  }
  .detail-tab.active { color: var(--accent); border-bottom-color: var(--accent); }
  .detail-tab:hover:not(.active) { color: var(--text2); }
  .tab-content { display: none; flex: 1; overflow: hidden; }
  .tab-content.active { display: flex; flex-direction: column; flex: 1; }

  .info-scroll { flex: 1; overflow-y: auto; }
  .info-scroll::-webkit-scrollbar { width: 5px; }
  .info-scroll::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }
  .info-grid { display: grid; grid-template-columns: 1fr 1fr; padding: 0 24px; }
  .info-item { padding: 15px 0; border-bottom: 1px solid var(--border); }
  .info-item:nth-child(odd) { padding-right: 28px; border-right: 1px solid var(--border); }
  .info-item:nth-child(even) { padding-left: 28px; }
  .info-label { font-family: var(--mono); font-size: 10px; letter-spacing: 0.16em; text-transform: uppercase; color: var(--text3); margin-bottom: 5px; }
  .info-value { font-size: 14px; color: var(--text); }
  .info-full { grid-column: 1 / -1; border-right: none !important; padding-right: 0 !important; }
  .info-notes .info-value { color: var(--text2); line-height: 1.75; font-size: 13px; }
  .parts-wrap { display: flex; flex-wrap: wrap; gap: 7px; padding-top: 10px; }
  .part-chip {
    display: inline-flex; align-items: center; gap: 6px;
    background: var(--bg3); border: 1px solid var(--border);
    border-radius: 5px; padding: 5px 11px;
    font-size: 12px; color: var(--text2);
  }
  .part-chip-dot { width: 5px; height: 5px; border-radius: 50%; background: var(--accent); opacity: 0.6; flex-shrink: 0; }

  /* PDF tab */
  .pdf-viewer-wrap { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
  .pdf-toolbar {
    padding: 9px 18px; border-bottom: 1px solid var(--border);
    display: flex; align-items: center; gap: 10px;
    flex-shrink: 0; background: var(--bg3);
  }
  .pdf-toolbar select {
    background: var(--bg2); border: 1px solid var(--border); color: var(--text);
    border-radius: 5px; padding: 5px 10px;
    font-family: var(--sans); font-size: 12px; outline: none; cursor: pointer;
  }
  .pdf-nav-btn {
    background: var(--bg2); border: 1px solid var(--border); color: var(--text2);
    border-radius: 5px; width: 28px; height: 28px;
    cursor: pointer; font-size: 14px;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.14s;
  }
  .pdf-nav-btn:hover { border-color: var(--accent); color: var(--accent); }
  .pdf-page-info { font-family: var(--mono); font-size: 11px; color: var(--text3); min-width: 56px; text-align: center; }
  .pdf-sep { flex: 1; }
  #pdf-canvas-wrap {
    flex: 1; overflow: auto; background: var(--bg);
    display: flex; align-items: flex-start; justify-content: center; padding: 24px;
  }
  #pdf-canvas-wrap::-webkit-scrollbar { width: 6px; height: 6px; }
  #pdf-canvas-wrap::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }
  #pdf-canvas { max-width: 100%; box-shadow: var(--shadow-md); border-radius: 2px; }
  .pdf-no-file { display: flex; flex-direction: column; align-items: center; justify-content: center; color: var(--text3); font-size: 13px; gap: 12px; height: 240px; width: 100%; }
  .pdf-loading { display: flex; align-items: center; justify-content: center; color: var(--text3); font-family: var(--mono); font-size: 12px; letter-spacing: 0.15em; height: 200px; width: 100%; }

  /* ─── Modal ─── */
  .modal-overlay {
    position: fixed; inset: 0;
    background: rgba(26,26,23,0.42);
    z-index: 500; display: flex; align-items: center; justify-content: center;
    opacity: 0; pointer-events: none; transition: opacity 0.22s;
    backdrop-filter: blur(3px);
  }
  .modal-overlay.open { opacity: 1; pointer-events: all; }
  .modal {
    background: var(--bg2); border: 1px solid var(--border);
    border-radius: 12px; width: 580px; max-height: 78vh;
    display: flex; flex-direction: column;
    transform: scale(0.96) translateY(8px);
    transition: transform 0.22s; overflow: hidden;
    box-shadow: var(--shadow-lg);
  }
  .modal-overlay.open .modal { transform: scale(1) translateY(0); }

  .modal-header {
    padding: 20px 24px 16px; border-bottom: 1px solid var(--border);
    display: flex; align-items: center; background: var(--bg2);
  }
  .modal-title { font-family: var(--serif); font-size: 17px; font-weight: 600; color: var(--text); flex: 1; }

  .modal-queue-summary {
    padding: 12px 22px; border-bottom: 1px solid var(--border);
    background: var(--bg3); display: flex; flex-wrap: wrap; gap: 6px; flex-shrink: 0;
  }
  .modal-queue-chip {
    display: inline-flex; align-items: center; gap: 6px;
    background: var(--bg2); border: 1px solid var(--border);
    border-radius: 5px; padding: 4px 10px; font-size: 12px; color: var(--text2);
  }
  .modal-queue-chip-num { font-family: var(--mono); font-size: 10px; color: var(--accent); letter-spacing: 0.08em; }

  .modal-body { flex: 1; overflow-y: auto; padding: 18px 22px; }
  .modal-body::-webkit-scrollbar { width: 5px; }
  .modal-body::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }

  .modal-parts-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
  .modal-parts-label { font-family: var(--mono); font-size: 10px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--text3); }
  .modal-select-all {
    font-family: var(--mono); font-size: 10px; letter-spacing: 0.1em;
    color: var(--text2); cursor: pointer;
    border: 1px solid var(--border2); background: transparent;
    padding: 4px 10px; border-radius: 5px; transition: all 0.14s;
  }
  .modal-select-all:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-dim); }

  .modal-parts-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(148px, 1fr)); gap: 7px; }
  .part-check-label {
    display: flex; align-items: center; gap: 8px;
    cursor: pointer; padding: 8px 11px;
    border-radius: 6px; border: 1px solid var(--border);
    transition: all 0.14s; user-select: none; background: var(--bg2);
  }
  .part-check-label:hover { border-color: var(--border2); background: var(--bg3); }
  .part-check-label.checked { border-color: var(--accent); background: var(--accent-dim); }
  .part-check-label input { display: none; }
  .part-check-box {
    width: 15px; height: 15px; border: 1px solid var(--border2);
    border-radius: 3px; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    font-size: 10px; color: transparent; transition: all 0.14s;
  }
  .part-check-label.checked .part-check-box { background: var(--accent); border-color: var(--accent); color: #fff; }
  .part-check-name { font-size: 12px; color: var(--text2); flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .part-check-label.checked .part-check-name { color: var(--accent-dk); font-weight: 500; }
  .part-score-count {
    font-family: var(--mono); font-size: 9px; color: var(--text3);
    background: var(--bg4); border-radius: 3px; padding: 1px 4px; flex-shrink: 0;
  }
  .part-check-label.checked .part-score-count { background: rgba(45,106,79,0.15); color: var(--accent); }

  .modal-footer {
    padding: 13px 22px; border-top: 1px solid var(--border);
    display: flex; align-items: center; gap: 10px; background: var(--bg2);
  }
  .modal-info-wrap { flex: 1; }
  .modal-info-text { font-family: var(--mono); font-size: 11px; color: var(--text3); }
  .progress-bar-wrap { height: 3px; background: var(--border); border-radius: 2px; overflow: hidden; margin-top: 5px; }
  .progress-bar-fill { height: 100%; background: var(--accent); border-radius: 2px; transition: width 0.3s; width: 0%; }

  .btn-cancel {
    padding: 9px 18px; background: transparent;
    border: 1px solid var(--border2); color: var(--text2);
    border-radius: 7px; font-family: var(--sans); font-size: 13px;
    cursor: pointer; transition: all 0.14s;
  }
  .btn-cancel:hover { border-color: var(--text2); color: var(--text); }
  .btn-dl {
    padding: 9px 22px; background: var(--accent); color: #fff; border: none;
    border-radius: 7px; font-family: var(--serif); font-size: 14px; font-weight: 600;
    cursor: pointer; letter-spacing: 0.04em;
    transition: background 0.18s, box-shadow 0.18s;
    box-shadow: var(--shadow-sm);
  }
  .btn-dl:hover { background: var(--accent-dk); box-shadow: var(--shadow-md); }
  .btn-dl:disabled { background: var(--border2); color: var(--text3); cursor: not-allowed; box-shadow: none; }

  /* ─── Toast ─── */
  .toast {
    position: fixed; bottom: 22px; right: 22px;
    background: var(--text); border-radius: 8px;
    padding: 11px 18px; font-size: 13px; color: #fff;
    opacity: 0; transform: translateY(6px); transition: all 0.2s;
    z-index: 9999; pointer-events: none; max-width: 320px;
    box-shadow: var(--shadow-md);
  }
  .toast.show { opacity: 1; transform: translateY(0); }
  .toast.success { background: var(--accent-dk); }
  .toast.error { background: var(--danger); }
</style>
</head>
<body>

<header>
  <div>
    <div class="logo"><span class="logo-mark">♩</span>Baseball Library</div>
    <div class="logo-sub">Baseball Score Manager</div>
  </div>
  <div class="header-sep"></div>
  <div class="header-count" id="header-count">— / — scores</div>
</header>

<div class="layout">

  <!-- Score List -->
  <div class="score-list-wrap">
    <div class="list-header">
      <span class="list-title">楽曲一覧</span>
      <input type="text" class="search-box" id="search-input" placeholder="曲名・作曲者で検索...">
    </div>
    <div class="score-table-wrap">
      <table>
        <thead>
          <tr>
            <th>No.</th>
            <th>曲名</th>
            <th>作曲者</th>
            <th>ジャンル</th>
            <th>パート数</th>
            <th class="col-actions">追加</th>
          </tr>
        </thead>
        <tbody id="score-tbody"></tbody>
      </table>
    </div>
  </div>

  <!-- Right Panel -->
  <div class="right-panel">
    <div class="panel-section-title">生成キュー</div>
    <div class="queue-list" id="queue-list">
      <div class="queue-empty">
        <span class="queue-empty-icon">𝄞</span>
        楽譜を追加すると<br>ここに表示されます
      </div>
    </div>
    <div class="panel-footer">
      <button class="btn-generate" id="btn-generate" disabled>楽譜を生成する</button>
    </div>
  </div>
</div>

<!-- Detail Panel -->
<div class="detail-overlay" id="detail-overlay">
  <div class="detail-backdrop" id="detail-backdrop"></div>
  <div class="detail-panel">
    <div class="detail-header">
      <span class="detail-num" id="d-num"></span>
      <div class="detail-title-wrap">
        <div class="detail-title" id="d-title"></div>
        <div class="detail-subtitle" id="d-subtitle"></div>
      </div>
      <button class="btn-close" id="btn-close-detail">✕</button>
    </div>
    <div class="detail-body">
      <div class="detail-tabs">
        <button class="detail-tab active" data-tab="info">楽曲情報</button>
        <button class="detail-tab" data-tab="pdf">スコア PDF</button>
      </div>
      <div class="tab-content active" id="tab-info">
        <div class="info-scroll">
          <div class="info-grid" id="info-grid"></div>
        </div>
      </div>
      <div class="tab-content" id="tab-pdf">
        <div class="pdf-viewer-wrap">
          <div class="pdf-toolbar">
            <select id="pdf-part-select"></select>
            <button class="pdf-nav-btn" id="pdf-prev">‹</button>
            <span class="pdf-page-info" id="pdf-page-info">— / —</span>
            <button class="pdf-nav-btn" id="pdf-next">›</button>
            <div class="pdf-sep"></div>
            <button class="pdf-nav-btn" id="pdf-zoom-out" title="縮小">−</button>
            <button class="pdf-nav-btn" id="pdf-zoom-in" title="拡大">＋</button>
          </div>
          <div id="pdf-canvas-wrap">
            <div class="pdf-no-file" id="pdf-no-file">
              <span style="font-size:34px;opacity:0.22">📄</span>
              PDFファイルが設定されていません
            </div>
            <canvas id="pdf-canvas" style="display:none"></canvas>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Generate Modal -->
<div class="modal-overlay" id="modal-overlay">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title">パート譜を生成する</span>
      <button class="btn-close" id="btn-close-modal">✕</button>
    </div>
    <div class="modal-queue-summary" id="modal-queue-summary"></div>
    <div class="modal-body">
      <div class="modal-parts-header">
        <span class="modal-parts-label">出力するパートを選択</span>
        <button class="modal-select-all" id="modal-select-all-btn">全選択 / 解除</button>
      </div>
      <div class="modal-parts-grid" id="modal-parts-grid"></div>
    </div>
    <div class="modal-footer">
      <div class="modal-info-wrap">
        <div class="modal-info-text" id="modal-info-text">パートを選択してください</div>
        <div class="progress-bar-wrap" id="progress-wrap" style="display:none">
          <div class="progress-bar-fill" id="progress-bar"></div>
        </div>
      </div>
      <button class="btn-cancel" id="btn-cancel-modal">キャンセル</button>
      <button class="btn-dl" id="btn-download">生成＆ダウンロード</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf-lib/1.17.1/pdf-lib.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<script>
pdfjsLib.GlobalWorkerOptions.workerSrc =
  'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

let allScores = [], filteredScores = [], queue = [];
let activeScore = null;
let pdfDoc = null, pdfPage = 1, pdfTotal = 0, pdfScale = 1.2, currentPdfUrl = null;

// ─── Load ───
async function loadScores() {
  try {
    const res = await fetch('data/scores.json');
    allScores = await res.json();
    filteredScores = [...allScores];
    renderTable();
    updateHeaderCount();
  } catch { showToast('scores.json の読み込みに失敗しました', 'error'); }
}

// ─── Table ───
function renderTable() {
  const term = document.getElementById('search-input').value.toLowerCase();
  filteredScores = allScores.filter(s =>
    !term || s.title.toLowerCase().includes(term) ||
    s.composer.toLowerCase().includes(term) ||
    (s.arranger && s.arranger.toLowerCase().includes(term))
  );
  const tbody = document.getElementById('score-tbody');
  tbody.innerHTML = '';
  filteredScores.forEach(score => {
    const inQ = queue.some(q => q.id === score.id);
    const isAct = activeScore && activeScore.id === score.id;
    const tr = document.createElement('tr');
    if (inQ) tr.classList.add('in-queue');
    if (isAct) tr.classList.add('active');
    tr.innerHTML = `
      <td class="col-num">${score.number}</td>
      <td class="col-title"><span class="in-queue-dot"></span>${score.title}</td>
      <td class="col-composer">${score.composer}${score.arranger ? ` <span style="color:var(--text3);font-size:11px">arr. ${score.arranger}</span>` : ''}</td>
      <td><span class="genre-badge">${score.genre}</span></td>
      <td style="font-family:var(--mono);font-size:12px;color:var(--text3)">${score.parts.length}</td>
      <td class="col-actions">
        <button class="btn-add ${inQ ? 'added' : ''}" data-id="${score.id}">${inQ ? '✓' : '+'}</button>
      </td>
    `;
    tr.querySelector('.btn-add').addEventListener('click', e => { e.stopPropagation(); toggleQueue(score.id); });
    tr.addEventListener('click', () => openDetail(score));
    tbody.appendChild(tr);
  });
  updateHeaderCount();
}
function updateHeaderCount() {
  document.getElementById('header-count').textContent = `${filteredScores.length} / ${allScores.length} scores`;
}

// ─── Queue ───
function toggleQueue(id) {
  const score = allScores.find(s => s.id === id);
  if (!score) return;
  const idx = queue.findIndex(q => q.id === id);
  if (idx >= 0) { queue.splice(idx, 1); showToast(`「${score.title}」をキューから削除しました`); }
  else { queue.push({ id, score }); showToast(`「${score.title}」を追加しました`, 'success'); }
  renderTable(); renderQueue();
}
function renderQueue() {
  const el = document.getElementById('queue-list');
  document.getElementById('btn-generate').disabled = queue.length === 0;
  if (queue.length === 0) {
    el.innerHTML = `<div class="queue-empty"><span class="queue-empty-icon">𝄞</span>楽譜を追加すると<br>ここに表示されます</div>`;
    return;
  }
  el.innerHTML = queue.map((q, i) => `
    <div class="queue-item" data-idx="${i}">
      <div class="queue-item-num">${q.score.number}</div>
      <div class="queue-item-title">${q.score.title}</div>
      <button class="queue-item-remove" data-id="${q.id}">✕</button>
    </div>
  `).join('');
  el.querySelectorAll('.queue-item-remove').forEach(b =>
    b.addEventListener('click', e => { e.stopPropagation(); toggleQueue(b.dataset.id); }));
  el.querySelectorAll('.queue-item').forEach(item =>
    item.addEventListener('click', () => { const s = queue[+item.dataset.idx]?.score; if (s) openDetail(s); }));
}

// ─── Detail ───
function openDetail(score) {
  activeScore = score;
  renderTable();
  document.getElementById('d-num').textContent = score.number;
  document.getElementById('d-title').textContent = score.title;
  document.getElementById('d-subtitle').textContent =
    [score.composer, score.arranger ? `arr. ${score.arranger}` : ''].filter(Boolean).join(' / ');

  const fields = [['ジャンル', score.genre], ['演奏時間', score.duration], ['難易度', score.difficulty], ['パート数', score.parts.length + ' パート']];
  document.getElementById('info-grid').innerHTML =
    fields.map(([l, v]) => `<div class="info-item"><div class="info-label">${l}</div><div class="info-value">${v||'—'}</div></div>`).join('') +
    (score.notes ? `<div class="info-item info-full info-notes"><div class="info-label">メモ</div><div class="info-value">${score.notes}</div></div>` : '') +
    `<div class="info-item info-full" style="border-bottom:none"><div class="info-label">パート一覧</div><div class="parts-wrap">${score.parts.map(p=>`<span class="part-chip"><span class="part-chip-dot"></span>${p.name}</span>`).join('')}</div></div>`;

  const sel = document.getElementById('pdf-part-select');
  sel.innerHTML = `<option value="full">スコア（総譜）</option>` + score.parts.map(p => `<option value="${p.file}">${p.name}</option>`).join('');
  sel.value = 'full';

  switchTab('info');
  pdfPage = 1; pdfScale = 1.2; currentPdfUrl = null;
  document.getElementById('pdf-canvas').style.display = 'none';
  document.getElementById('pdf-no-file').style.display = 'flex';
  document.getElementById('detail-overlay').classList.add('open');
}
function closeDetail() {
  document.getElementById('detail-overlay').classList.remove('open');
  activeScore = null; renderTable();
  if (pdfDoc) { pdfDoc.destroy(); pdfDoc = null; }
}
document.getElementById('btn-close-detail').addEventListener('click', closeDetail);
document.getElementById('detail-backdrop').addEventListener('click', closeDetail);

function switchTab(name) {
  document.querySelectorAll('.detail-tab').forEach(t => t.classList.toggle('active', t.dataset.tab === name));
  document.querySelectorAll('.tab-content').forEach(c => c.classList.toggle('active', c.id === `tab-${name}`));
}
document.querySelectorAll('.detail-tab').forEach(tab => {
  tab.addEventListener('click', () => {
    switchTab(tab.dataset.tab);
    if (tab.dataset.tab === 'pdf' && activeScore && !currentPdfUrl) loadPdf(activeScore.fullScore || null);
  });
});

// ─── PDF Viewer ───
async function loadPdf(url) {
  if (!url) { document.getElementById('pdf-canvas').style.display='none'; document.getElementById('pdf-no-file').style.display='flex'; return; }
  document.getElementById('pdf-no-file').innerHTML = '<div class="pdf-loading">読み込み中...</div>';
  document.getElementById('pdf-no-file').style.display = 'flex';
  document.getElementById('pdf-canvas').style.display = 'none';
  try {
    if (pdfDoc) { pdfDoc.destroy(); pdfDoc = null; }
    pdfDoc = await pdfjsLib.getDocument(url).promise;
    pdfTotal = pdfDoc.numPages; pdfPage = 1; currentPdfUrl = url;
    renderPdfPage();
  } catch {
    document.getElementById('pdf-no-file').innerHTML =
      `<span style="font-size:28px;opacity:0.22">⚠</span><span style="color:var(--danger)">PDFを読み込めませんでした</span><span style="font-size:11px;color:var(--text3)">${url}</span>`;
  }
}
async function renderPdfPage() {
  if (!pdfDoc) return;
  const page = await pdfDoc.getPage(pdfPage);
  const vp = page.getViewport({ scale: pdfScale });
  const canvas = document.getElementById('pdf-canvas');
  canvas.height = vp.height; canvas.width = vp.width;
  await page.render({ canvasContext: canvas.getContext('2d'), viewport: vp }).promise;
  canvas.style.display = 'block';
  document.getElementById('pdf-no-file').style.display = 'none';
  document.getElementById('pdf-page-info').textContent = `${pdfPage} / ${pdfTotal}`;
}
document.getElementById('pdf-part-select').addEventListener('change', e => {
  if (!activeScore) return;
  const v = e.target.value; loadPdf(v === 'full' ? activeScore.fullScore : v);
});
document.getElementById('pdf-prev').addEventListener('click', () => { if(pdfPage>1){pdfPage--;renderPdfPage();} });
document.getElementById('pdf-next').addEventListener('click', () => { if(pdfPage<pdfTotal){pdfPage++;renderPdfPage();} });
document.getElementById('pdf-zoom-in').addEventListener('click', () => { pdfScale=Math.min(pdfScale+0.2,3.0);renderPdfPage(); });
document.getElementById('pdf-zoom-out').addEventListener('click', () => { pdfScale=Math.max(pdfScale-0.2,0.4);renderPdfPage(); });

// ─── Modal: 全曲まとめてパート選択 ───
function buildPartMap() {
  // partName -> [{ score, file }]
  const map = new Map();
  queue.forEach(({ score }) => {
    score.parts.forEach(p => {
      if (!map.has(p.name)) map.set(p.name, []);
      map.get(p.name).push({ score, file: p.file });
    });
  });
  return map;
}

function openModal() {
  // キューサマリー（モーダル上部）
  document.getElementById('modal-queue-summary').innerHTML =
    queue.map(q => `<span class="modal-queue-chip"><span class="modal-queue-chip-num">${q.score.number}</span>${q.score.title}</span>`).join('');

  // パートグリッド（全曲横断・パート名で統合）
  const partMap = buildPartMap();
  const grid = document.getElementById('modal-parts-grid');
  grid.innerHTML = '';
  partMap.forEach((items, partName) => {
    const lbl = document.createElement('label');
    lbl.className = 'part-check-label';
    lbl.dataset.part = partName;
    lbl.innerHTML = `
      <input type="checkbox">
      <span class="part-check-box">✓</span>
      <span class="part-check-name">${partName}</span>
      ${items.length > 1 ? `<span class="part-score-count">×${items.length}</span>` : ''}
    `;
    lbl.querySelector('input').addEventListener('change', e => lbl.classList.toggle('checked', e.target.checked));
    grid.appendChild(lbl);
  });

  document.getElementById('modal-select-all-btn').onclick = () => {
    const all = grid.querySelectorAll('.part-check-label');
    const allChecked = [...all].every(l => l.querySelector('input').checked);
    all.forEach(l => { l.querySelector('input').checked = !allChecked; l.classList.toggle('checked', !allChecked); });
  };

  document.getElementById('progress-wrap').style.display = 'none';
  document.getElementById('progress-bar').style.width = '0%';
  document.getElementById('modal-info-text').textContent = 'パートを選択してください';
  document.getElementById('btn-download').disabled = false;
  document.getElementById('modal-overlay').classList.add('open');
}
function closeModal() { document.getElementById('modal-overlay').classList.remove('open'); }

document.getElementById('btn-generate').addEventListener('click', openModal);
document.getElementById('btn-close-modal').addEventListener('click', closeModal);
document.getElementById('btn-cancel-modal').addEventListener('click', closeModal);

// ─── Download（パートごと個別PDF → ZIPまとめ）───
document.getElementById('btn-download').addEventListener('click', async () => {
  const partMap = buildPartMap();

  // 選択パートを収集: { partName, items:[{score,file}] }[]
  const selectedParts = [];
  document.querySelectorAll('#modal-parts-grid .part-check-label.checked').forEach(lbl => {
    const pn = lbl.dataset.part;
    if (partMap.has(pn)) selectedParts.push({ partName: pn, items: partMap.get(pn) });
  });
  if (selectedParts.length === 0) { showToast('パートが選択されていません', 'error'); return; }

  document.getElementById('btn-download').disabled = true;
  document.getElementById('progress-wrap').style.display = 'block';

  try {
    const { PDFDocument } = PDFLib;
    const zip = new JSZip();
    const total = selectedParts.length;

    for (let i = 0; i < total; i++) {
      const { partName, items } = selectedParts[i];
      document.getElementById('modal-info-text').textContent =
        `処理中: ${partName} (${i + 1} / ${total})`;
      document.getElementById('progress-bar').style.width = `${((i + 1) / total) * 100}%`;

      // パート1つにつき1つのPDFを生成（複数曲あればページを結合）
      const partPdf = await PDFDocument.create();
      for (const { score, file } of items) {
        try {
          const bytes = await fetch(file).then(r => r.arrayBuffer());
          const src = await PDFDocument.load(bytes);
          const pages = await partPdf.copyPages(src, src.getPageIndices());
          pages.forEach(p => partPdf.addPage(p));
        } catch {
          showToast(`読み込み失敗: ${score.title} — ${partName}`, 'error');
        }
      }

      const pdfBytes = await partPdf.save();

      // ファイル名: パート名をそのまま使用（記号を安全な文字に変換）
      const safeName = partName.replace(/[\\/:*?"<>|]/g, '_');
      zip.file(`${safeName}.pdf`, pdfBytes);
    }

    document.getElementById('modal-info-text').textContent = 'ZIPファイルを生成中...';
    document.getElementById('progress-bar').style.width = '100%';

    const zipBlob = await zip.generateAsync({ type: 'blob' });
    const url = URL.createObjectURL(zipBlob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `score_${new Date().toISOString().slice(0, 10)}.zip`;
    a.click();
    URL.revokeObjectURL(url);

    showToast('ZIPダウンロードを開始しました', 'success');
    closeModal();
  } catch(e) {
    showToast('ZIP生成中にエラーが発生しました', 'error');
    console.error(e);
  }

  document.getElementById('btn-download').disabled = false;
  document.getElementById('progress-wrap').style.display = 'none';
});

// ─── Search & Toast ───
document.getElementById('search-input').addEventListener('input', renderTable);

let toastTimer;
function showToast(msg, type = '') {
  const el = document.getElementById('toast');
  el.textContent = msg; el.className = `toast ${type} show`;
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 3000);
}

loadScores();
</script>
</body>
</html>
