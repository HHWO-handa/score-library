<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Score Library</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;600&family=DM+Mono:wght@400;500&family=Noto+Sans+JP:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f0e0d;
    --bg2: #161513;
    --bg3: #1e1c19;
    --bg4: #252320;
    --surface: #2a2825;
    --border: #332f2a;
    --border2: #3d3830;
    --accent: #c9a84c;
    --accent2: #e8c96a;
    --accent-dim: rgba(201,168,76,0.12);
    --accent-glow: rgba(201,168,76,0.06);
    --text: #e8e2d8;
    --text2: #a09888;
    --text3: #6b6255;
    --danger: #c05a3a;
    --danger-dim: rgba(192,90,58,0.12);
    --success: #5a9a6a;
    --panel-w: 280px;
    --serif: 'Noto Serif JP', serif;
    --sans: 'Noto Sans JP', sans-serif;
    --mono: 'DM Mono', monospace;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    font-size: 14px;
    height: 100vh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  /* ─── Header ─── */
  header {
    height: 52px;
    background: var(--bg2);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    padding: 0 24px;
    gap: 12px;
    flex-shrink: 0;
    z-index: 100;
  }
  .logo {
    font-family: var(--serif);
    font-size: 18px;
    font-weight: 600;
    color: var(--accent);
    letter-spacing: 0.08em;
  }
  .logo-sub {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--text3);
    letter-spacing: 0.2em;
    text-transform: uppercase;
    margin-top: 2px;
  }
  .header-sep { flex: 1; }
  .header-count {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text3);
    letter-spacing: 0.1em;
  }

  /* ─── Layout ─── */
  .layout {
    display: flex;
    flex: 1;
    overflow: hidden;
  }

  /* ─── Score List ─── */
  .score-list-wrap {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    border-right: 1px solid var(--border);
  }

  .list-header {
    padding: 16px 20px 12px;
    border-bottom: 1px solid var(--border);
    background: var(--bg2);
    display: flex;
    align-items: center;
    gap: 10px;
    flex-shrink: 0;
  }
  .list-title {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--text3);
    flex: 1;
  }
  .search-box {
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 6px 10px;
    color: var(--text);
    font-family: var(--sans);
    font-size: 13px;
    width: 200px;
    outline: none;
    transition: border-color 0.2s;
  }
  .search-box::placeholder { color: var(--text3); }
  .search-box:focus { border-color: var(--accent); }

  .score-table-wrap {
    flex: 1;
    overflow-y: auto;
  }
  .score-table-wrap::-webkit-scrollbar { width: 6px; }
  .score-table-wrap::-webkit-scrollbar-track { background: transparent; }
  .score-table-wrap::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }

  table {
    width: 100%;
    border-collapse: collapse;
  }
  thead {
    position: sticky;
    top: 0;
    background: var(--bg3);
    z-index: 10;
  }
  th {
    padding: 10px 16px;
    text-align: left;
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--text3);
    border-bottom: 1px solid var(--border);
    font-weight: 400;
    white-space: nowrap;
  }
  th:first-child { width: 80px; }
  th.col-actions { width: 110px; text-align: center; }

  tbody tr {
    border-bottom: 1px solid var(--border);
    cursor: pointer;
    transition: background 0.15s;
  }
  tbody tr:hover { background: var(--bg3); }
  tbody tr.active { background: var(--accent-dim); }
  tbody tr.in-queue { background: rgba(90,154,106,0.06); }
  tbody tr.in-queue.active { background: var(--accent-dim); }

  td {
    padding: 12px 16px;
    vertical-align: middle;
  }
  td.col-num {
    font-family: var(--mono);
    font-size: 12px;
    color: var(--text3);
    letter-spacing: 0.1em;
  }
  td.col-title {
    font-family: var(--serif);
    font-size: 15px;
    color: var(--text);
  }
  td.col-composer { color: var(--text2); font-size: 13px; }
  td.col-genre {
    font-size: 11px;
    color: var(--text3);
  }
  .genre-badge {
    display: inline-block;
    background: var(--bg4);
    border: 1px solid var(--border2);
    border-radius: 4px;
    padding: 2px 8px;
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.08em;
    color: var(--text2);
  }
  td.col-actions {
    text-align: center;
    white-space: nowrap;
  }
  .btn-add, .btn-remove {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 28px;
    height: 28px;
    border-radius: 6px;
    border: 1px solid;
    cursor: pointer;
    font-size: 16px;
    transition: all 0.15s;
    background: transparent;
    line-height: 1;
  }
  .btn-add {
    border-color: var(--border2);
    color: var(--text2);
  }
  .btn-add:hover {
    border-color: var(--accent);
    color: var(--accent);
    background: var(--accent-dim);
  }
  .btn-add.added {
    border-color: var(--success);
    color: var(--success);
    background: rgba(90,154,106,0.1);
  }
  .btn-remove {
    border-color: var(--border2);
    color: var(--text2);
    margin-left: 6px;
  }
  .btn-remove:hover {
    border-color: var(--danger);
    color: var(--danger);
    background: var(--danger-dim);
  }
  .in-queue-dot {
    display: inline-block;
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--success);
    margin-right: 6px;
    vertical-align: middle;
    opacity: 0;
    transition: opacity 0.2s;
  }
  tr.in-queue .in-queue-dot { opacity: 1; }

  /* ─── Right Panel ─── */
  .right-panel {
    width: var(--panel-w);
    background: var(--bg2);
    display: flex;
    flex-direction: column;
    overflow: hidden;
    flex-shrink: 0;
  }
  .panel-section-title {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--text3);
    padding: 16px 18px 10px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }

  .queue-list {
    flex: 1;
    overflow-y: auto;
    padding: 8px 0;
  }
  .queue-list::-webkit-scrollbar { width: 4px; }
  .queue-list::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

  .queue-empty {
    padding: 24px 18px;
    text-align: center;
    color: var(--text3);
    font-size: 12px;
    line-height: 1.8;
  }
  .queue-empty-icon {
    font-size: 24px;
    display: block;
    margin-bottom: 8px;
    opacity: 0.4;
  }

  .queue-item {
    padding: 10px 16px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: flex-start;
    gap: 10px;
    cursor: pointer;
    transition: background 0.15s;
  }
  .queue-item:hover { background: var(--bg3); }
  .queue-item-num {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--accent);
    letter-spacing: 0.1em;
    margin-top: 2px;
    flex-shrink: 0;
  }
  .queue-item-title {
    font-family: var(--serif);
    font-size: 13px;
    color: var(--text);
    line-height: 1.4;
    flex: 1;
  }
  .queue-item-remove {
    width: 18px;
    height: 18px;
    border-radius: 4px;
    border: 1px solid transparent;
    background: transparent;
    color: var(--text3);
    cursor: pointer;
    font-size: 14px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: all 0.15s;
    margin-top: 1px;
  }
  .queue-item-remove:hover {
    border-color: var(--danger);
    color: var(--danger);
    background: var(--danger-dim);
  }

  .panel-footer {
    padding: 14px 16px;
    border-top: 1px solid var(--border);
    flex-shrink: 0;
  }
  .btn-generate {
    width: 100%;
    padding: 11px;
    background: var(--accent);
    color: var(--bg);
    border: none;
    border-radius: 8px;
    font-family: var(--serif);
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    letter-spacing: 0.05em;
    transition: all 0.2s;
  }
  .btn-generate:hover { background: var(--accent2); }
  .btn-generate:disabled {
    background: var(--border2);
    color: var(--text3);
    cursor: not-allowed;
  }

  /* ─── Detail Panel (slides in over list) ─── */
  .detail-overlay {
    position: fixed;
    inset: 52px 0 0 0;
    z-index: 200;
    pointer-events: none;
    display: flex;
  }
  .detail-backdrop {
    position: absolute;
    inset: 0;
    background: rgba(0,0,0,0.5);
    opacity: 0;
    transition: opacity 0.3s;
    pointer-events: none;
  }
  .detail-panel {
    margin-left: auto;
    width: calc(100% - var(--panel-w));
    max-width: 900px;
    background: var(--bg2);
    border-left: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    transform: translateX(100%);
    transition: transform 0.3s cubic-bezier(0.4,0,0.2,1);
    pointer-events: none;
    overflow: hidden;
  }
  .detail-overlay.open .detail-backdrop {
    opacity: 1;
    pointer-events: all;
  }
  .detail-overlay.open .detail-panel {
    transform: translateX(0);
    pointer-events: all;
  }

  .detail-header {
    padding: 20px 24px 16px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: flex-start;
    gap: 16px;
    flex-shrink: 0;
  }
  .detail-num {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--accent);
    letter-spacing: 0.15em;
    margin-top: 4px;
    flex-shrink: 0;
  }
  .detail-title-wrap { flex: 1; }
  .detail-title {
    font-family: var(--serif);
    font-size: 22px;
    font-weight: 600;
    color: var(--text);
    line-height: 1.3;
  }
  .detail-subtitle {
    font-size: 13px;
    color: var(--text2);
    margin-top: 4px;
  }
  .btn-close {
    background: transparent;
    border: 1px solid var(--border2);
    color: var(--text2);
    border-radius: 6px;
    width: 32px;
    height: 32px;
    cursor: pointer;
    font-size: 18px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.15s;
    flex-shrink: 0;
    margin-top: 2px;
  }
  .btn-close:hover { border-color: var(--text2); color: var(--text); }

  .detail-body {
    flex: 1;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }
  .detail-tabs {
    display: flex;
    padding: 0 24px;
    border-bottom: 1px solid var(--border);
    gap: 0;
    flex-shrink: 0;
  }
  .detail-tab {
    padding: 12px 20px;
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--text3);
    cursor: pointer;
    border-bottom: 2px solid transparent;
    transition: all 0.15s;
    background: none;
    border-top: none;
    border-left: none;
    border-right: none;
    margin-bottom: -1px;
  }
  .detail-tab.active {
    color: var(--accent);
    border-bottom-color: var(--accent);
  }
  .detail-tab:hover:not(.active) { color: var(--text2); }

  .tab-content { display: none; flex: 1; overflow: hidden; }
  .tab-content.active { display: flex; flex-direction: column; flex: 1; }

  /* Info tab */
  .info-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 0;
    padding: 20px 24px;
    overflow-y: auto;
  }
  .info-item {
    padding: 14px 0;
    border-bottom: 1px solid var(--border);
  }
  .info-item:nth-child(odd) { padding-right: 32px; border-right: 1px solid var(--border); }
  .info-item:nth-child(even) { padding-left: 32px; }
  .info-label {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--text3);
    margin-bottom: 6px;
  }
  .info-value {
    font-size: 14px;
    color: var(--text);
  }
  .info-notes {
    grid-column: 1 / -1;
    padding: 16px 0 0;
    border-right: none !important;
    padding-right: 0 !important;
  }
  .info-notes .info-value {
    color: var(--text2);
    line-height: 1.7;
    font-size: 13px;
  }
  .parts-list {
    padding: 16px 24px;
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    overflow-y: auto;
  }
  .part-chip {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 6px 12px;
    font-size: 13px;
    color: var(--text2);
    cursor: default;
  }
  .part-chip-dot {
    width: 5px;
    height: 5px;
    border-radius: 50%;
    background: var(--accent);
    opacity: 0.5;
    flex-shrink: 0;
  }

  /* PDF tab */
  .pdf-viewer-wrap {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  .pdf-toolbar {
    padding: 10px 20px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 12px;
    flex-shrink: 0;
    background: var(--bg3);
  }
  .pdf-toolbar select {
    background: var(--bg4);
    border: 1px solid var(--border2);
    color: var(--text);
    border-radius: 6px;
    padding: 5px 10px;
    font-family: var(--sans);
    font-size: 12px;
    outline: none;
    cursor: pointer;
  }
  .pdf-nav-btn {
    background: var(--bg4);
    border: 1px solid var(--border2);
    color: var(--text2);
    border-radius: 5px;
    width: 28px;
    height: 28px;
    cursor: pointer;
    font-size: 14px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.15s;
  }
  .pdf-nav-btn:hover { border-color: var(--accent); color: var(--accent); }
  .pdf-page-info {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text3);
    min-width: 60px;
    text-align: center;
  }
  .pdf-sep { flex: 1; }

  #pdf-canvas-wrap {
    flex: 1;
    overflow: auto;
    background: var(--bg);
    display: flex;
    align-items: flex-start;
    justify-content: center;
    padding: 20px;
  }
  #pdf-canvas-wrap::-webkit-scrollbar { width: 6px; height: 6px; }
  #pdf-canvas-wrap::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }
  #pdf-canvas {
    max-width: 100%;
    box-shadow: 0 4px 24px rgba(0,0,0,0.5);
    border-radius: 2px;
  }
  .pdf-loading {
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--text3);
    font-family: var(--mono);
    font-size: 12px;
    letter-spacing: 0.15em;
    height: 200px;
    width: 100%;
  }
  .pdf-no-file {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    color: var(--text3);
    font-size: 13px;
    gap: 10px;
    height: 200px;
    width: 100%;
  }

  /* ─── Generate Modal ─── */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    z-index: 500;
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.25s;
  }
  .modal-overlay.open {
    opacity: 1;
    pointer-events: all;
  }
  .modal {
    background: var(--bg2);
    border: 1px solid var(--border2);
    border-radius: 12px;
    width: 600px;
    max-height: 80vh;
    display: flex;
    flex-direction: column;
    transform: scale(0.95);
    transition: transform 0.25s;
    overflow: hidden;
  }
  .modal-overlay.open .modal { transform: scale(1); }

  .modal-header {
    padding: 20px 24px 16px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
  }
  .modal-title {
    font-family: var(--serif);
    font-size: 17px;
    font-weight: 600;
    color: var(--text);
    flex: 1;
  }
  .modal-body {
    flex: 1;
    overflow-y: auto;
    padding: 20px 24px;
  }
  .modal-body::-webkit-scrollbar { width: 5px; }
  .modal-body::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }

  .modal-score-block {
    margin-bottom: 24px;
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
  }
  .modal-score-header {
    background: var(--bg3);
    padding: 12px 16px;
    display: flex;
    align-items: center;
    gap: 12px;
    border-bottom: 1px solid var(--border);
  }
  .modal-score-num {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--accent);
    letter-spacing: 0.1em;
  }
  .modal-score-title {
    font-family: var(--serif);
    font-size: 15px;
    color: var(--text);
    flex: 1;
  }
  .modal-select-all {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.1em;
    color: var(--text3);
    cursor: pointer;
    border: 1px solid var(--border2);
    background: transparent;
    padding: 3px 8px;
    border-radius: 4px;
    transition: all 0.15s;
  }
  .modal-select-all:hover { border-color: var(--accent); color: var(--accent); }
  .modal-parts-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
    gap: 8px;
    padding: 14px 16px;
  }
  .part-check-label {
    display: flex;
    align-items: center;
    gap: 8px;
    cursor: pointer;
    padding: 7px 10px;
    border-radius: 6px;
    border: 1px solid var(--border);
    transition: all 0.15s;
    user-select: none;
  }
  .part-check-label:hover { border-color: var(--border2); background: var(--bg3); }
  .part-check-label.checked {
    border-color: var(--accent);
    background: var(--accent-glow);
  }
  .part-check-label input { display: none; }
  .part-check-box {
    width: 14px;
    height: 14px;
    border: 1px solid var(--border2);
    border-radius: 3px;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.15s;
    font-size: 10px;
    color: transparent;
  }
  .part-check-label.checked .part-check-box {
    background: var(--accent);
    border-color: var(--accent);
    color: var(--bg);
  }
  .part-check-name {
    font-size: 12px;
    color: var(--text2);
    flex: 1;
  }
  .part-check-label.checked .part-check-name { color: var(--text); }

  .modal-footer {
    padding: 16px 24px;
    border-top: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .modal-info {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text3);
    flex: 1;
  }
  .btn-cancel {
    padding: 9px 20px;
    background: transparent;
    border: 1px solid var(--border2);
    color: var(--text2);
    border-radius: 7px;
    font-family: var(--sans);
    font-size: 13px;
    cursor: pointer;
    transition: all 0.15s;
  }
  .btn-cancel:hover { border-color: var(--text2); color: var(--text); }
  .btn-dl {
    padding: 9px 22px;
    background: var(--accent);
    color: var(--bg);
    border: none;
    border-radius: 7px;
    font-family: var(--serif);
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    letter-spacing: 0.04em;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .btn-dl:hover { background: var(--accent2); }
  .btn-dl:disabled { background: var(--border2); color: var(--text3); cursor: not-allowed; }

  .progress-bar-wrap {
    position: relative;
    height: 3px;
    background: var(--border);
    border-radius: 2px;
    overflow: hidden;
    margin-top: 6px;
  }
  .progress-bar-fill {
    position: absolute;
    left: 0;
    top: 0;
    height: 100%;
    background: var(--accent);
    border-radius: 2px;
    transition: width 0.3s;
    width: 0%;
  }

  /* ─── Toast ─── */
  .toast {
    position: fixed;
    bottom: 24px;
    right: 24px;
    background: var(--bg3);
    border: 1px solid var(--border2);
    border-radius: 8px;
    padding: 12px 18px;
    font-size: 13px;
    color: var(--text);
    opacity: 0;
    transform: translateY(8px);
    transition: all 0.2s;
    z-index: 9999;
    pointer-events: none;
    max-width: 320px;
  }
  .toast.show {
    opacity: 1;
    transform: translateY(0);
  }
  .toast.success { border-left: 3px solid var(--success); }
  .toast.error { border-left: 3px solid var(--danger); }
</style>
</head>
<body>

<!-- Header -->
<header>
  <div>
    <div class="logo">♩ Score Library</div>
    <div class="logo-sub">Wind Band Score Manager</div>
  </div>
  <div class="header-sep"></div>
  <div class="header-count" id="header-count">— / — scores</div>
</header>

<!-- Layout -->
<div class="layout">

  <!-- Score List -->
  <div class="score-list-wrap">
    <div class="list-header">
      <span class="list-title">楽曲一覧</span>
      <input type="text" class="search-box" id="search-input" placeholder="曲名・作曲者で検索...">
    </div>
    <div class="score-table-wrap">
      <table id="score-table">
        <thead>
          <tr>
            <th>No.</th>
            <th>曲名</th>
            <th>作曲者</th>
            <th>ジャンル</th>
            <th>パート数</th>
            <th class="col-actions">操作</th>
          </tr>
        </thead>
        <tbody id="score-tbody"></tbody>
      </table>
    </div>
  </div>

  <!-- Right Panel -->
  <div class="right-panel">
    <div class="panel-section-title">生成キュー</div>
    <div class="queue-list" id="queue-list">
      <div class="queue-empty">
        <span class="queue-empty-icon">𝄞</span>
        楽譜を追加すると<br>ここに表示されます
      </div>
    </div>
    <div class="panel-footer">
      <button class="btn-generate" id="btn-generate" disabled>楽譜を生成する</button>
    </div>
  </div>
</div>

<!-- Detail Panel (slide-over) -->
<div class="detail-overlay" id="detail-overlay">
  <div class="detail-backdrop" id="detail-backdrop"></div>
  <div class="detail-panel" id="detail-panel">
    <div class="detail-header">
      <span class="detail-num" id="d-num"></span>
      <div class="detail-title-wrap">
        <div class="detail-title" id="d-title"></div>
        <div class="detail-subtitle" id="d-subtitle"></div>
      </div>
      <button class="btn-close" id="btn-close-detail">✕</button>
    </div>
    <div class="detail-body">
      <div class="detail-tabs">
        <button class="detail-tab active" data-tab="info">楽曲情報</button>
        <button class="detail-tab" data-tab="pdf">スコア PDF</button>
      </div>
      <!-- Info Tab -->
      <div class="tab-content active" id="tab-info">
        <div class="info-grid" id="info-grid"></div>
      </div>
      <!-- PDF Tab -->
      <div class="tab-content" id="tab-pdf">
        <div class="pdf-viewer-wrap">
          <div class="pdf-toolbar">
            <select id="pdf-part-select"></select>
            <button class="pdf-nav-btn" id="pdf-prev">‹</button>
            <span class="pdf-page-info" id="pdf-page-info">— / —</span>
            <button class="pdf-nav-btn" id="pdf-next">›</button>
            <div class="pdf-sep"></div>
            <button class="pdf-nav-btn" id="pdf-zoom-out" title="縮小">−</button>
            <button class="pdf-nav-btn" id="pdf-zoom-in" title="拡大">＋</button>
          </div>
          <div id="pdf-canvas-wrap">
            <div class="pdf-no-file" id="pdf-no-file">
              <span style="font-size:32px;opacity:0.3">📄</span>
              PDFファイルが設定されていません
            </div>
            <canvas id="pdf-canvas" style="display:none"></canvas>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Generate Modal -->
<div class="modal-overlay" id="modal-overlay">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title">パート譜を生成する</span>
      <button class="btn-close" id="btn-close-modal">✕</button>
    </div>
    <div class="modal-body" id="modal-body"></div>
    <div class="modal-footer">
      <div class="modal-info" id="modal-info">
        <div id="modal-info-text">出力するパートを選択してください</div>
        <div class="progress-bar-wrap" id="progress-wrap" style="display:none">
          <div class="progress-bar-fill" id="progress-bar"></div>
        </div>
      </div>
      <button class="btn-cancel" id="btn-cancel-modal">キャンセル</button>
      <button class="btn-dl" id="btn-download">
        <span>生成＆ダウンロード</span>
      </button>
    </div>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<!-- PDF.js -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<!-- pdf-lib -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf-lib/1.17.1/pdf-lib.min.js"></script>

<script>
const { PDFLib } = window;
pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

let allScores = [];
let filteredScores = [];
let queue = []; // { id, score }
let activeScore = null;
let pdfDoc = null;
let pdfPage = 1;
let pdfTotal = 0;
let pdfScale = 1.2;
let currentPdfUrl = null;

// ─── Data Load ───
async function loadScores() {
  try {
    const res = await fetch('data/scores.json');
    allScores = await res.json();
    filteredScores = [...allScores];
    renderTable();
    updateHeaderCount();
  } catch(e) {
    showToast('scores.json の読み込みに失敗しました', 'error');
  }
}

// ─── Table Render ───
function renderTable() {
  const tbody = document.getElementById('score-tbody');
  tbody.innerHTML = '';
  const term = document.getElementById('search-input').value.toLowerCase();
  filteredScores = allScores.filter(s =>
    !term ||
    s.title.toLowerCase().includes(term) ||
    s.composer.toLowerCase().includes(term) ||
    (s.arranger && s.arranger.toLowerCase().includes(term))
  );

  filteredScores.forEach(score => {
    const inQueue = queue.some(q => q.id === score.id);
    const isActive = activeScore && activeScore.id === score.id;
    const tr = document.createElement('tr');
    tr.dataset.id = score.id;
    if (inQueue) tr.classList.add('in-queue');
    if (isActive) tr.classList.add('active');

    tr.innerHTML = `
      <td class="col-num">${score.number}</td>
      <td class="col-title">
        <span class="in-queue-dot"></span>${score.title}
      </td>
      <td class="col-composer">${score.composer}${score.arranger ? ` <span style="color:var(--text3);font-size:11px">arr. ${score.arranger}</span>` : ''}</td>
      <td class="col-genre"><span class="genre-badge">${score.genre}</span></td>
      <td style="color:var(--text3);font-family:var(--mono);font-size:12px">${score.parts.length}</td>
      <td class="col-actions">
        <button class="btn-add ${inQueue ? 'added' : ''}" data-id="${score.id}" title="${inQueue ? 'キューに追加済み' : 'キューに追加'}">
          ${inQueue ? '✓' : '+'}
        </button>
        <button class="btn-remove" data-id="${score.id}" title="削除（未実装）">−</button>
      </td>
    `;

    tr.querySelector('.btn-add').addEventListener('click', e => {
      e.stopPropagation();
      toggleQueue(score.id);
    });
    tr.querySelector('.btn-remove').addEventListener('click', e => {
      e.stopPropagation();
      showToast('楽曲の削除はscores.jsonを直接編集してください', 'error');
    });
    tr.addEventListener('click', () => openDetail(score));
    tbody.appendChild(tr);
  });

  updateHeaderCount();
}

function updateHeaderCount() {
  document.getElementById('header-count').textContent =
    `${filteredScores.length} / ${allScores.length} scores`;
}

// ─── Queue ───
function toggleQueue(id) {
  const score = allScores.find(s => s.id === id);
  if (!score) return;
  const idx = queue.findIndex(q => q.id === id);
  if (idx >= 0) {
    queue.splice(idx, 1);
    showToast(`「${score.title}」をキューから削除しました`);
  } else {
    queue.push({ id, score });
    showToast(`「${score.title}」をキューに追加しました`, 'success');
  }
  renderTable();
  renderQueue();
}

function renderQueue() {
  const el = document.getElementById('queue-list');
  const btn = document.getElementById('btn-generate');
  if (queue.length === 0) {
    el.innerHTML = `<div class="queue-empty"><span class="queue-empty-icon">𝄞</span>楽譜を追加すると<br>ここに表示されます</div>`;
    btn.disabled = true;
    return;
  }
  btn.disabled = false;
  el.innerHTML = queue.map((q, i) => `
    <div class="queue-item" data-idx="${i}">
      <div class="queue-item-num">${q.score.number}</div>
      <div class="queue-item-title">${q.score.title}</div>
      <button class="queue-item-remove" data-id="${q.id}" title="削除">✕</button>
    </div>
  `).join('');
  el.querySelectorAll('.queue-item-remove').forEach(btn => {
    btn.addEventListener('click', e => {
      e.stopPropagation();
      toggleQueue(btn.dataset.id);
    });
  });
  el.querySelectorAll('.queue-item').forEach(item => {
    item.addEventListener('click', () => {
      const score = queue[parseInt(item.dataset.idx)]?.score;
      if (score) openDetail(score);
    });
  });
}

// ─── Detail Panel ───
function openDetail(score) {
  activeScore = score;
  renderTable();

  document.getElementById('d-num').textContent = score.number;
  document.getElementById('d-title').textContent = score.title;
  document.getElementById('d-subtitle').textContent =
    [score.composer, score.arranger ? `arr. ${score.arranger}` : ''].filter(Boolean).join(' / ');

  // Info tab
  const grid = document.getElementById('info-grid');
  const fields = [
    ['ジャンル', score.genre],
    ['演奏時間', score.duration],
    ['難易度', score.difficulty],
    ['パート数', score.parts.length + ' パート'],
  ];
  grid.innerHTML = fields.map(([l, v]) => `
    <div class="info-item">
      <div class="info-label">${l}</div>
      <div class="info-value">${v || '—'}</div>
    </div>
  `).join('') + (score.notes ? `
    <div class="info-item info-notes">
      <div class="info-label">メモ</div>
      <div class="info-value">${score.notes}</div>
    </div>
  ` : '') + `
    <div class="info-item" style="grid-column:1/-1;border-bottom:none;padding-bottom:0">
      <div class="info-label">パート一覧</div>
      <div class="parts-list" style="padding:10px 0 0;display:flex;flex-wrap:wrap;gap:6px">
        ${score.parts.map(p => `<span class="part-chip"><span class="part-chip-dot"></span>${p.name}</span>`).join('')}
      </div>
    </div>
  `;

  // PDF tab - part selector
  const sel = document.getElementById('pdf-part-select');
  sel.innerHTML = `<option value="full">スコア（総譜）</option>` +
    score.parts.map(p => `<option value="${p.file}">${p.name}</option>`).join('');
  sel.value = 'full';

  // Switch to info tab
  switchTab('info');
  pdfPage = 1;
  pdfScale = 1.2;
  currentPdfUrl = null;
  document.getElementById('pdf-canvas').style.display = 'none';
  document.getElementById('pdf-no-file').style.display = 'flex';

  document.getElementById('detail-overlay').classList.add('open');
}

function closeDetail() {
  document.getElementById('detail-overlay').classList.remove('open');
  activeScore = null;
  renderTable();
  if (pdfDoc) { pdfDoc.destroy(); pdfDoc = null; }
}

document.getElementById('btn-close-detail').addEventListener('click', closeDetail);
document.getElementById('detail-backdrop').addEventListener('click', closeDetail);

// ─── Tabs ───
function switchTab(name) {
  document.querySelectorAll('.detail-tab').forEach(t => t.classList.toggle('active', t.dataset.tab === name));
  document.querySelectorAll('.tab-content').forEach(c => c.classList.toggle('active', c.id === `tab-${name}`));
}
document.querySelectorAll('.detail-tab').forEach(tab => {
  tab.addEventListener('click', () => {
    switchTab(tab.dataset.tab);
    if (tab.dataset.tab === 'pdf' && activeScore && !currentPdfUrl) {
      loadPdf(activeScore.fullScore || null);
    }
  });
});

// ─── PDF Viewer ───
async function loadPdf(url) {
  if (!url) {
    document.getElementById('pdf-canvas').style.display = 'none';
    document.getElementById('pdf-no-file').style.display = 'flex';
    return;
  }
  document.getElementById('pdf-no-file').textContent = '';
  document.getElementById('pdf-no-file').innerHTML = '<div class="pdf-loading">読み込み中...</div>';
  document.getElementById('pdf-no-file').style.display = 'flex';
  document.getElementById('pdf-canvas').style.display = 'none';
  try {
    if (pdfDoc) { pdfDoc.destroy(); pdfDoc = null; }
    pdfDoc = await pdfjsLib.getDocument(url).promise;
    pdfTotal = pdfDoc.numPages;
    pdfPage = 1;
    currentPdfUrl = url;
    renderPdfPage();
  } catch(e) {
    document.getElementById('pdf-no-file').innerHTML =
      `<span style="font-size:28px;opacity:0.3">⚠</span><span style="color:var(--danger)">PDFを読み込めませんでした</span><span style="font-size:11px;color:var(--text3)">${url}</span>`;
    document.getElementById('pdf-no-file').style.display = 'flex';
  }
}

async function renderPdfPage() {
  if (!pdfDoc) return;
  const page = await pdfDoc.getPage(pdfPage);
  const viewport = page.getViewport({ scale: pdfScale });
  const canvas = document.getElementById('pdf-canvas');
  const ctx = canvas.getContext('2d');
  canvas.height = viewport.height;
  canvas.width = viewport.width;
  await page.render({ canvasContext: ctx, viewport }).promise;
  document.getElementById('pdf-canvas').style.display = 'block';
  document.getElementById('pdf-no-file').style.display = 'none';
  document.getElementById('pdf-page-info').textContent = `${pdfPage} / ${pdfTotal}`;
}

document.getElementById('pdf-part-select').addEventListener('change', e => {
  const val = e.target.value;
  if (!activeScore) return;
  const url = val === 'full' ? activeScore.fullScore : val;
  loadPdf(url || null);
});
document.getElementById('pdf-prev').addEventListener('click', () => {
  if (pdfPage > 1) { pdfPage--; renderPdfPage(); }
});
document.getElementById('pdf-next').addEventListener('click', () => {
  if (pdfPage < pdfTotal) { pdfPage++; renderPdfPage(); }
});
document.getElementById('pdf-zoom-in').addEventListener('click', () => {
  pdfScale = Math.min(pdfScale + 0.2, 3.0);
  renderPdfPage();
});
document.getElementById('pdf-zoom-out').addEventListener('click', () => {
  pdfScale = Math.max(pdfScale - 0.2, 0.4);
  renderPdfPage();
});

// ─── Generate Modal ───
document.getElementById('btn-generate').addEventListener('click', openModal);
document.getElementById('btn-close-modal').addEventListener('click', closeModal);
document.getElementById('btn-cancel-modal').addEventListener('click', closeModal);

function openModal() {
  const body = document.getElementById('modal-body');
  body.innerHTML = '';
  queue.forEach(q => {
    const block = document.createElement('div');
    block.className = 'modal-score-block';
    block.dataset.id = q.id;
    block.innerHTML = `
      <div class="modal-score-header">
        <span class="modal-score-num">${q.score.number}</span>
        <span class="modal-score-title">${q.score.title}</span>
        <button class="modal-select-all" data-id="${q.id}">全選択</button>
      </div>
      <div class="modal-parts-grid">
        ${q.score.parts.map(p => `
          <label class="part-check-label" data-file="${p.file}">
            <input type="checkbox" value="${p.file}">
            <span class="part-check-box">✓</span>
            <span class="part-check-name">${p.name}</span>
          </label>
        `).join('')}
      </div>
    `;
    block.querySelectorAll('.part-check-label').forEach(lbl => {
      lbl.addEventListener('click', () => {
        const cb = lbl.querySelector('input');
        setTimeout(() => {
          lbl.classList.toggle('checked', cb.checked);
        }, 0);
      });
    });
    block.querySelector('.modal-select-all').addEventListener('click', () => {
      const all = block.querySelectorAll('.part-check-label');
      const allChecked = [...all].every(l => l.querySelector('input').checked);
      all.forEach(l => {
        l.querySelector('input').checked = !allChecked;
        l.classList.toggle('checked', !allChecked);
      });
    });
    body.appendChild(block);
  });
  document.getElementById('progress-wrap').style.display = 'none';
  document.getElementById('progress-bar').style.width = '0%';
  document.getElementById('modal-info-text').textContent = '出力するパートを選択してください';
  document.getElementById('btn-download').disabled = false;
  document.getElementById('modal-overlay').classList.add('open');
}

function closeModal() {
  document.getElementById('modal-overlay').classList.remove('open');
}

// ─── Download ───
document.getElementById('btn-download').addEventListener('click', async () => {
  const tasks = [];
  document.querySelectorAll('.modal-score-block').forEach(block => {
    const id = block.dataset.id;
    const score = queue.find(q => q.id === id)?.score;
    if (!score) return;
    block.querySelectorAll('.part-check-label.checked').forEach(lbl => {
      tasks.push({ score, file: lbl.dataset.file, partName: lbl.querySelector('.part-check-name').textContent });
    });
  });

  if (tasks.length === 0) {
    showToast('パートが選択されていません', 'error');
    return;
  }

  document.getElementById('btn-download').disabled = true;
  document.getElementById('progress-wrap').style.display = 'block';

  try {
    const { PDFDocument } = PDFLib;
    const merged = await PDFDocument.create();

    for (let i = 0; i < tasks.length; i++) {
      const t = tasks[i];
      document.getElementById('modal-info-text').textContent =
        `処理中: ${t.score.title} — ${t.partName} (${i+1}/${tasks.length})`;
      document.getElementById('progress-bar').style.width = `${((i+1)/tasks.length)*100}%`;

      try {
        const bytes = await fetch(t.file).then(r => r.arrayBuffer());
        const src = await PDFDocument.load(bytes);
        const pages = await merged.copyPages(src, src.getPageIndices());
        pages.forEach(p => merged.addPage(p));
      } catch(e) {
        showToast(`PDFの読み込み失敗: ${t.partName}`, 'error');
      }
    }

    const pdfBytes = await merged.save();
    const blob = new Blob([pdfBytes], { type: 'application/pdf' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    const names = [...new Set(queue.map(q => q.score.number))].join('_');
    a.download = `parts_${names}_${new Date().toISOString().slice(0,10)}.pdf`;
    a.click();
    URL.revokeObjectURL(url);
    showToast('ダウンロードを開始しました', 'success');
    closeModal();
  } catch(e) {
    showToast('PDF生成中にエラーが発生しました', 'error');
    console.error(e);
  }

  document.getElementById('btn-download').disabled = false;
  document.getElementById('progress-wrap').style.display = 'none';
});

// ─── Search ───
document.getElementById('search-input').addEventListener('input', renderTable);

// ─── Toast ───
let toastTimer;
function showToast(msg, type = '') {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = `toast ${type} show`;
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 3000);
}

// ─── Init ───
loadScores();
</script>
</body>
</html>
